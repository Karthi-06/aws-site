<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karthi DevOps Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            padding: 100px 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            opacity: 0.9;
        }

        .btn {
            margin-top: 30px;
            padding: 12px 25px;
            background: white;
            color: #1e3c72;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background: #f1f1f1;
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Karthi's AWS DevOps Server</h1>
        <p>Deployed using EC2 + Nginx + Git</p>
        <a href="#" class="btn">More Coming Soon</a>
    </div>

    <footer>
        © 2026 Karthi Shetty | Hosted on AWS EC2
    </footer>

</body>
</html>
